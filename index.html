<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>麻酱 - 麻将积分记录</title>
  <style>
    :root {
      --primary: #2D5016;
      --secondary: #D4A843;
      --accent: #C73E3A;
      --bg: #1A1A1A;
      --surface: #2A2A2A;
      --text: #F5F5F5;
      --text-dim: #999;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .header {
      background: var(--surface);
      padding: 16px;
      text-align: center;
      border-bottom: 1px solid #3a3a3a;
      position: sticky; top: 0; z-index: 10;
    }
    .header h1 { font-size: 20px; color: var(--secondary); }
    .header p { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

    /* Main list */
    #record-list { padding: 16px; }
    .record-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
      cursor: pointer;
    }
    .record-card:active { opacity: 0.85; }
    .rc-title { font-size: 16px; font-weight: bold; color: var(--text); margin-bottom: 6px; }
    .rc-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; display: flex; gap: 12px; }
    .rc-scores { display: flex; flex-wrap: wrap; gap: 6px; }
    .score-chip {
      font-size: 12px; padding: 3px 8px; border-radius: 6px; background: #3a3a3a;
    }
    .score-chip.positive { color: #6fcf97; }
    .score-chip.negative { color: #eb5757; }
    .empty {
      text-align: center; color: var(--text-dim); padding: 60px 20px;
      font-size: 14px; line-height: 1.8;
    }
    .btn-new {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--secondary); color: #1a1a1a;
      border: none; width: 56px; height: 56px;
      border-radius: 50%; font-size: 28px; cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      z-index: 50;
    }
    .btn-new:active { transform: scale(0.95); }

    /* Detail/Edit Page */
    .detail-page {
      display: none; min-height: 100vh; background: var(--bg);
    }
    .detail-page.active { display: block; }
    .detail-header {
      background: var(--surface); padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid #3a3a3a; position: sticky; top: 0; z-index: 10;
    }
    .back-btn {
      background: none; border: none; color: var(--secondary);
      font-size: 18px; cursor: pointer; padding: 4px 8px;
    }
    .detail-title-input {
      flex: 1; background: #3a3a3a; border: 1px solid #444;
      color: var(--text); padding: 8px 12px; border-radius: 8px;
      font-size: 16px; font-weight: bold;
    }
    .detail-title-input:focus { outline: none; border-color: var(--secondary); }
    .detail-body { padding: 16px; }
    .date-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border-radius: 10px;
      padding: 12px 14px; margin-bottom: 16px;
    }
    .date-row label { font-size: 13px; color: var(--text-dim); }
    .date-row input {
      flex: 1; background: #3a3a3a; border: 1px solid #444;
      color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 14px;
    }
    .date-row input:focus { outline: none; border-color: var(--secondary); }
    .section-label {
      font-size: 12px; color: var(--text-dim); margin-bottom: 10px; padding-left: 2px;
    }
    .score-row {
      background: var(--surface); border-radius: 10px;
      padding: 12px 14px; margin-bottom: 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .score-row label { font-size: 15px; }
    .score-row input {
      background: #3a3a3a; border: 1px solid #444; color: var(--text);
      padding: 8px 12px; border-radius: 6px; font-size: 16px;
      width: 90px; text-align: center;
    }
    .score-row input:focus { outline: none; border-color: var(--secondary); }
    .add-player-btn {
      background: var(--surface); border: 1px dashed #444;
      border-radius: 10px; padding: 12px; text-align: center;
      color: var(--text-dim); font-size: 14px; cursor: pointer; margin-bottom: 16px;
    }
    .add-player-btn:active { background: #333; }
    .detail-footer {
      padding: 16px; display: flex; flex-direction: column; gap: 10px;
    }
    .btn-save {
      background: var(--secondary); color: #1a1a1a; border: none;
      padding: 14px; border-radius: 10px; font-size: 16px; font-weight: bold;
      cursor: pointer; width: 100%;
    }
    .btn-save:active { opacity: 0.85; }
    .btn-del {
      background: transparent; color: var(--accent); border: 1px solid var(--accent);
      padding: 12px; border-radius: 10px; font-size: 14px; cursor: pointer; width: 100%;
    }
    .btn-del:active { background: var(--accent); color: white; }

    /* New Record Page */
    .new-page {
      display: none; min-height: 100vh; background: var(--bg);
    }
    .new-page.active { display: block; }
    .new-body { padding: 16px; }
    .tag-select {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;
    }
    .player-check {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border-radius: 10px;
      padding: 12px 14px; margin-bottom: 8px; cursor: pointer;
    }
    .player-check input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--secondary); }
    .player-check .pname { font-size: 15px; }
    .player-check .ptags { font-size: 11px; color: var(--text-dim); }
    .player-check.checked { border: 1px solid var(--secondary); background: #2a3a1a; }
    .tag {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      background: #3a3a3a; color: var(--text-dim);
    }
  </style>
</head>
<body>

<!-- ====== 主列表页 ====== -->
<div id="main-page">
  <div class="header">
    <h1>🀄 麻酱</h1>
    <p>麻将战绩记录</p>
  </div>
  <div id="record-list"></div>
  <button class="btn-new" onclick="openNewPage()">+</button>
</div>

<!-- ====== 记录详情页 ====== -->
<div class="detail-page" id="detail-page">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetailPage()">←</button>
    <input type="text" class="detail-title-input" id="detail-title" placeholder="记录标题（如：第1局）">
  </div>
  <div class="detail-body">
    <div class="date-row">
      <label>📅 日期</label>
      <input type="date" id="detail-date">
    </div>
    <p class="section-label">参与玩家 · 点击积分修改</p>
    <div id="detail-players"></div>
    <div class="add-player-btn" onclick="openPlayerPicker()">+ 添加玩家</div>
  </div>
  <div class="detail-footer">
    <button class="btn-save" onclick="saveDetail()">保存修改</button>
    <button class="btn-del" onclick="deleteCurrentRecord()">删除记录</button>
  </div>
</div>

<!-- ====== 新建记录页 ====== -->
<div class="new-page" id="new-page">
  <div class="detail-header">
    <button class="back-btn" onclick="closeNewPage()">←</button>
    <input type="text" class="detail-title-input" id="new-title" placeholder="记录标题（如：第1局）">
  </div>
  <div class="new-body">
    <div class="date-row">
      <label>📅 日期</label>
      <input type="date" id="new-date">
    </div>
    <p class="section-label">选择参与玩家</p>
    <div id="new-player-list"></div>
  </div>
  <div class="detail-footer">
    <button class="btn-save" onclick="createRecord()">创建记录</button>
  </div>
</div>

<!-- ====== 玩家选择弹窗 ====== -->
<div class="modal-overlay" id="playerPickerModal">
  <div class="modal" style="max-height:80vh;overflow-y:auto;">
    <h3 style="margin-bottom:16px;">添加玩家</h3>
    <div id="picker-player-list"></div>
    <div class="modal-btns" style="margin-top:16px;">
      <button class="cancel" onclick="closePlayerPicker()" style="flex:1;padding:12px;border-radius:8px;border:none;font-size:15px;cursor:pointer;background:#3a3a3a;color:#F5F5F5;">关闭</button>
    </div>
  </div>
</div>

<script>
// ============ Data ============
const LS_PLAYERS = 'mahjong_players';
const LS_RECORDS = 'mahjong_records';
const LS_CUSTOM_TAGS = 'mahjong_custom_tags';
const PRESET_TAGS = { lucky: '🌟运气好', skillful: '🧠技术好', counter: '📊会算牌', newbie: '🌱新手' };
const TAG_MAP = { ...PRESET_TAGS };

function uuid() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }
function getPlayers() { return JSON.parse(localStorage.getItem(LS_PLAYERS) || '[]'); }
function savePlayers(arr) { localStorage.setItem(LS_PLAYERS, JSON.stringify(arr)); }
function getRecords() { return JSON.parse(localStorage.getItem(LS_RECORDS) || '[]'); }
function saveRecords(arr) { localStorage.setItem(LS_RECORDS, JSON.stringify(arr)); }
function getCustomTags() {
  const raw = JSON.parse(localStorage.getItem(LS_CUSTOM_TAGS) || '[]');
  if (raw.length > 0 && typeof raw[0] === 'string') {
    const migrated = raw.map(name => ({ name, icon: '🏷️' }));
    saveCustomTags(migrated); return migrated;
  }
  return raw;
}
function saveCustomTags(arr) { localStorage.setItem(LS_CUSTOM_TAGS, JSON.stringify(arr)); }

// ============ 主列表 ============
let currentRecordId = null;

function renderRecordList() {
  const list = document.getElementById('record-list');
  const records = getRecords();
  const players = getPlayers();

  if (!records.length) {
    list.innerHTML = '<div class="empty">还没有记录<br>点击右下角 + 新建</div>';
    return;
  }

  // Sort by createdAt desc (newest first)
  const sorted = [...records].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

  list.innerHTML = sorted.map(r => {
    const title = r.title || '第?局';
    const date = r.date || '';
    const time = r.time || '';
    const createdAt = r.createdAt ? new Date(r.createdAt) : new Date();
    const createdStr = createdAt.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }) + ' ' + createdAt.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    const scoreHtml = r.players.map(ps => {
      const p = players.find(x => x.id === ps.playerId);
      const name = p ? p.name : '未知';
      const cls = ps.score >= 0 ? 'positive' : 'negative';
      const sign = ps.score >= 0 ? '+' : '';
      return `<span class="score-chip ${cls}">${name} ${sign}${ps.score}</span>`;
    }).join('');
    return `
      <div class="record-card" onclick="openDetail('${r.id}')">
        <div class="rc-title">${title}</div>
        <div class="rc-meta">
          <span>📅 ${date || createdStr}</span>
          <span>⏰ ${time || ''}</span>
        </div>
        <div class="rc-scores">${scoreHtml || '<span class="score-chip">暂无积分</span>'}</div>
      </div>
    `;
  }).join('');
}

// ============ 详情页 ============
function openDetail(id) {
  currentRecordId = id;
  const records = getRecords();
  const r = records.find(x => x.id === id);
  if (!r) return;

  document.getElementById('detail-title').value = r.title || '';
  document.getElementById('detail-date').value = r.date || '';
  renderDetailPlayers(r);
  document.getElementById('detail-page').classList.add('active');
}

function renderDetailPlayers(record) {
  const container = document.getElementById('detail-players');
  const players = getPlayers();
  if (!record.players.length) {
    container.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:8px 0;">暂无玩家，请添加</div>';
    return;
  }
  container.innerHTML = record.players.map(ps => {
    const p = players.find(x => x.id === ps.playerId);
    const name = p ? p.name : '未知';
    return `
      <div class="score-row">
        <label>${name}</label>
        <input type="number" id="score-${ps.playerId}" value="${ps.score}" placeholder="0">
      </div>
    `;
  }).join('');
}

function openPlayerPicker() {
  const records = getRecords();
  const r = records.find(x => x.id === currentRecordId);
  const usedIds = r ? r.players.map(ps => ps.playerId) : [];
  const allPlayers = getPlayers();
  const available = allPlayers.filter(p => !usedIds.includes(p.id));

  const container = document.getElementById('picker-player-list');
  if (!available.length) {
    container.innerHTML = '<div style="color:var(--text-dim);font-size:13px;text-align:center;padding:16px;">所有玩家已添加</div>';
  } else {
    container.innerHTML = available.map(p => `
      <div class="player-check" onclick="addPlayerToRecord('${p.id}', this)">
        <input type="checkbox">
        <div><div class="pname">${p.name}</div><div class="ptags">${p.tags.map(t => {
          if (t.startsWith('custom_')) {
            const name = t.replace('custom_', '');
            const ct = getCustomTags().find(c => c.name === name);
            return ct ? (ct.icon || '🏷️') + ct.name : '🏷️' + name;
          }
          return TAG_MAP[t] || t;
        }).join(' ')}</div></div>
      </div>
    `).join('');
  }
  document.getElementById('playerPickerModal').classList.add('active');
}

function addPlayerToRecord(playerId, row) {
  const records = getRecords();
  const r = records.find(x => x.id === currentRecordId);
  if (!r) return;
  if (r.players.find(ps => ps.playerId === playerId)) return;
  r.players.push({ playerId, score: 0 });
  saveRecords(records);
  renderDetailPlayers(r);
  row.remove();
}

function closePlayerPicker() {
  document.getElementById('playerPickerModal').classList.remove('active');
}

function saveDetail() {
  const records = getRecords();
  const r = records.find(x => x.id === currentRecordId);
  if (!r) return;

  r.title = document.getElementById('detail-title').value.trim() || '第?局';
  r.date = document.getElementById('detail-date').value;
  r.players.forEach(ps => {
    const inp = document.getElementById('score-' + ps.playerId);
    if (inp) ps.score = parseInt(inp.value) || 0;
  });
  saveRecords(records);
  renderRecordList();
  closeDetailPage();
  alert('已保存');
}

function deleteCurrentRecord() {
  if (!confirm('确认删除该记录？')) return;
  saveRecords(getRecords().filter(x => x.id !== currentRecordId));
  renderRecordList();
  closeDetailPage();
}

function closeDetailPage() {
  document.getElementById('detail-page').classList.remove('active');
  currentRecordId = null;
}

// ============ 新建页 ============
let newSelectedPlayerIds = [];

function openNewPage() {
  newSelectedPlayerIds = [];
  document.getElementById('new-title').value = '';
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('new-date').value = today;
  renderNewPlayerList();
  document.getElementById('new-page').classList.add('active');
}

function renderNewPlayerList() {
  const container = document.getElementById('new-player-list');
  const players = getPlayers();
  if (!players.length) {
    container.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:8px 0;">请先在设置中添加玩家</div>';
    return;
  }
  container.innerHTML = players.map(p => `
    <div class="player-check${newSelectedPlayerIds.includes(p.id) ? ' checked' : ''}" onclick="toggleNewPlayer('${p.id}', this)">
      <input type="checkbox"${newSelectedPlayerIds.includes(p.id) ? ' checked' : ''}>
      <div>
        <div class="pname">${p.name}</div>
        <div class="ptags">${p.tags.map(t => {
          if (t.startsWith('custom_')) {
            const name = t.replace('custom_', '');
            const ct = getCustomTags().find(c => c.name === name);
            return ct ? (ct.icon || '🏷️') + ct.name : '🏷️' + name;
          }
          return TAG_MAP[t] || t;
        }).join(' ')}</div>
      </div>
    </div>
  `).join('');
}

function toggleNewPlayer(id, row) {
  const idx = newSelectedPlayerIds.indexOf(id);
  if (idx >= 0) {
    newSelectedPlayerIds.splice(idx, 1);
    row.classList.remove('checked');
    row.querySelector('input').checked = false;
  } else {
    newSelectedPlayerIds.push(id);
    row.classList.add('checked');
    row.querySelector('input').checked = true;
  }
}

function createRecord() {
  if (!newSelectedPlayerIds.length) { alert('请选择参与玩家'); return; }
  const title = document.getElementById('new-title').value.trim() || '第?局';
  const date = document.getElementById('new-date').value;
  const now = new Date();
  const timeStr = now.toTimeString().slice(0, 5);
  const players = newSelectedPlayerIds.map(id => ({ playerId: id, score: 0 }));
  const record = {
    id: uuid(),
    title,
    date,
    time: timeStr,
    createdAt: now.getTime(),
    players
  };
  const records = getRecords();
  records.unshift(record);
  saveRecords(records);
  renderRecordList();
  closeNewPage();
}

function closeNewPage() {
  document.getElementById('new-page').classList.remove('active');
  newSelectedPlayerIds = [];
}

// ============ Init ============
renderRecordList();
</script>
</body>
</html>

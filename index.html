<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>麻酱 - 麻将积分记录</title>
  <style>
    :root {
      --primary: #2D5016;
      --secondary: #D4A843;
      --accent: #C73E3A;
      --bg: #1A1A1A;
      --surface: #2A2A2A;
      --text: #F5F5F5;
      --text-dim: #999;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 60px;
      overflow-x: hidden;
    }
    .header {
      background: var(--surface);
      padding: 16px;
      text-align: center;
      border-bottom: 1px solid #3a3a3a;
    }
    .header h1 { font-size: 20px; color: var(--secondary); }
    .header p { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

    /* Tab content */
    .tab-content { display: none; padding: 16px; }
    .tab-content.active { display: block; }

    /* Tab Bar */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      display: flex;
      border-top: 1px solid #3a3a3a;
      z-index: 100;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 8px;
      text-align: center;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-dim);
      border: none;
      background: none;
      transition: color 0.2s;
    }
    .tab-btn.active { color: var(--secondary); }
    .tab-btn span { display: block; font-size: 20px; margin-bottom: 2px; }

    /* Common */
    .section-title {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 12px;
      padding-left: 4px;
    }
    .btn-primary {
      background: var(--secondary);
      color: #1a1a1a;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }
    .btn-primary:active { opacity: 0.85; }
    .btn-danger {
      background: var(--accent);
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    /* Players */
    .player-card {
      background: var(--surface);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .player-info { flex: 1; }
    .player-name { font-size: 16px; font-weight: bold; margin-bottom: 6px; }
    .player-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #3a3a3a;
      color: var(--text-dim);
    }
    .player-del { background: none; border: none; color: var(--accent); font-size: 18px; cursor: pointer; padding: 4px 8px; }
    .empty { text-align: center; color: var(--text-dim); padding: 40px; font-size: 14px; }

    /* Score Input */
    .score-row {
      background: var(--surface);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .score-row label { font-size: 15px; }
    .score-row input {
      background: #3a3a3a;
      border: 1px solid #444;
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 16px;
      width: 100px;
      text-align: center;
    }
    .score-row input:focus { outline: none; border-color: var(--secondary); }
    .player-check {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .player-check input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--secondary); }
    .player-check .pname { font-size: 15px; }
    .player-check .ptags { font-size: 11px; color: var(--text-dim); }

    /* History */
    .record-card {
      background: var(--surface);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .record-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .record-date { font-size: 14px; color: var(--secondary); font-weight: bold; }
    .record-time { font-size: 12px; color: var(--text-dim); }
    .record-players { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
    .record-scores { display: flex; flex-wrap: wrap; gap: 8px; }
    .score-chip {
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 6px;
      background: #3a3a3a;
    }
    .score-chip.positive { color: #6fcf97; }
    .score-chip.negative { color: #eb5757; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 16px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 360px;
    }
    .modal h3 { margin-bottom: 20px; font-size: 17px; text-align: center; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
    .form-group input[type="text"] {
      width: 100%;
      background: #3a3a3a;
      border: 1px solid #444;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 15px;
    }
    .form-group input:focus { outline: none; border-color: var(--secondary); }
    .tag-select { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag-option {
      padding: 6px 12px;
      border-radius: 16px;
      border: 1px solid #444;
      font-size: 13px;
      cursor: pointer;
      background: #3a3a3a;
      color: var(--text-dim);
    }
    .tag-option.selected { border-color: var(--secondary); background: var(--secondary); color: #1a1a1a; }
    .tag-option.custom-tag { background: var(--primary); border-color: var(--primary); color: var(--text); }
    .tag-option.custom-tag.selected { background: var(--secondary); border-color: var(--secondary); color: #1a1a1a; }
    .tag-input-row { display: flex; gap: 8px; margin-top: 8px; }
    .tag-input-row input { flex: 1; background: #3a3a3a; border: 1px solid #444; color: var(--text); padding: 6px 10px; border-radius: 16px; font-size: 13px; }
    .tag-input-row input:focus { outline: none; border-color: var(--secondary); }
    .tag-input-row button { background: var(--primary); color: var(--text); border: none; padding: 6px 14px; border-radius: 16px; font-size: 13px; cursor: pointer; }
    .tag-icon-picker { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag-icon-btn { background: #3a3a3a; border: 1px solid #444; border-radius: 8px; padding: 4px 8px; font-size: 16px; cursor: pointer; }
    .tag-icon-btn.selected { border-color: var(--secondary); background: var(--secondary); }
    .modal-btns { display: flex; gap: 12px; margin-top: 20px; }
    .modal-btns button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 15px; cursor: pointer; }
    .modal-btns .cancel { background: #3a3a3a; color: var(--text); }
    .modal-btns .confirm { background: var(--secondary); color: #1a1a1a; font-weight: bold; }
  </style>
</head>
<body>

<div class="header">
  <h1>🀄 麻酱</h1>
  <p>麻将战绩记录</p>
</div>

<!-- 记录 Tab -->
<div id="tab-record" class="tab-content">
  <p class="section-title">选择参与玩家</p>
  <div id="player-check-list"></div>
  <div id="score-input-area" style="display:none; margin-top:16px;">
    <p class="section-title">输入积分</p>
    <div id="score-input-list"></div>
    <button class="btn-primary" style="margin-top:20px;" onclick="saveRecord()">保存战绩</button>
  </div>
</div>

<!-- 历史 Tab -->
<div id="tab-history" class="tab-content">
  <p class="section-title">战绩历史</p>
  <div id="history-list"></div>
</div>

<!-- 玩家 Tab -->
<div id="tab-player" class="tab-content">
  <p class="section-title">玩家列表</p>
  <div id="player-list"></div>
  <button class="btn-primary" style="margin-top:16px;" onclick="openAddPlayer()">+ 添加玩家</button>
</div>

<!-- Tab Bar -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('record')"><span>📝</span>记录</button>
  <button class="tab-btn" onclick="switchTab('history')"><span>📜</span>历史</button>
  <button class="tab-btn" onclick="switchTab('player')"><span>👥</span>玩家</button>
</div>

<!-- Add Player Modal -->
<div class="modal-overlay" id="addPlayerModal">
  <div class="modal">
    <h3>添加玩家</h3>
    <div class="form-group">
      <label>姓名</label>
      <input type="text" id="new-player-name" placeholder="请输入姓名" maxlength="10">
    </div>
    <div class="form-group">
      <label>标签（可多选）</label>
      <div class="tag-select" id="tag-select-area">
        <div class="tag-option" data-tag="lucky" onclick="toggleTag(this)">🌟 运气好</div>
        <div class="tag-option" data-tag="skillful" onclick="toggleTag(this)">🧠 技术好</div>
        <div class="tag-option" data-tag="counter" onclick="toggleTag(this)">📊 会算牌</div>
        <div class="tag-option" data-tag="newbie" onclick="toggleTag(this)">🌱 新手</div>
      </div>
      <div class="tag-input-row">
        <input type="text" id="custom-tag-input" placeholder="输入标签名..." maxlength="8">
        <button onclick="addCustomTag()">添加</button>
      </div>
      <div class="tag-icon-picker" id="tag-icon-picker">
        <span class="tag-icon-btn" onclick="selectTagIcon(this)">🎯</span>
        <span class="tag-icon-btn" onclick="selectTagIcon(this)">🔥</span>
        <span class="tag-icon-btn" onclick="selectTagIcon(this)">💎</span>
        <span class="tag-icon-btn" onclick="selectTagIcon(this)">⚡</span>
        <span class="tag-icon-btn" onclick="selectTagIcon(this)">👑</span>
        <span class="tag-icon-btn" onclick="selectTagIcon(this)">🎲</span>
        <span class="tag-icon-btn" onclick="selectTagIcon(this)">🌙</span>
        <span class="tag-icon-btn" onclick="selectTagIcon(this)">🍀</span>
        <span class="tag-icon-btn" onclick="selectTagIcon(this)">😈</span>
        <span class="tag-icon-btn" onclick="selectTagIcon(this)">🤡</span>
        <span class="tag-icon-btn" onclick="selectTagIcon(this)">🐯</span>
        <span class="tag-icon-btn" onclick="selectTagIcon(this)">🦁</span>
        <span class="tag-icon-btn" onclick="selectTagIcon(this)">🐺</span>
        <span class="tag-icon-btn" onclick="selectTagIcon(this)">🦊</span>
        <span class="tag-icon-btn" onclick="selectTagIcon(this)">🐼</span>
        <span class="tag-icon-btn" onclick="selectTagIcon(this)">🐨</span>
      </div>
    </div>
    <div class="modal-btns">
      <button class="cancel" onclick="closeAddPlayer()">取消</button>
      <button class="confirm" onclick="addPlayer()">确认</button>
    </div>
  </div>
</div>

<script>
// ============ Data ============
const LS_PLAYERS = 'mahjong_players';
const LS_RECORDS = 'mahjong_records';
const LS_CUSTOM_TAGS = 'mahjong_custom_tags';
const PRESET_TAGS = { lucky: '🌟运气好', skillful: '🧠技术好', counter: '📊会算牌', newbie: '🌱新手' };
const TAG_MAP = { ...PRESET_TAGS };

function uuid() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }
function getPlayers() { return JSON.parse(localStorage.getItem(LS_PLAYERS) || '[]'); }
function savePlayers(arr) { localStorage.setItem(LS_PLAYERS, JSON.stringify(arr)); }
function getRecords() { return JSON.parse(localStorage.getItem(LS_RECORDS) || '[]'); }
function saveRecords(arr) { localStorage.setItem(LS_RECORDS, JSON.stringify(arr)); }
function getCustomTags() { return JSON.parse(localStorage.getItem(LS_CUSTOM_TAGS) || '[]'); }
function saveCustomTags(arr) { localStorage.setItem(LS_CUSTOM_TAGS, JSON.stringify(arr)); }

// ============ Tab ============
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'player') renderPlayers();
  if (name === 'record') renderRecordTab();
}

// ============ Players ============
function renderPlayers() {
  const list = document.getElementById('player-list');
  const players = getPlayers();
  if (!players.length) {
    list.innerHTML = '<div class="empty">暂无玩家，请添加～</div>';
    return;
  }
  list.innerHTML = players.map(p => `
    <div class="player-card">
      <div class="player-info">
        <div class="player-name">${p.name}</div>
        <div class="player-tags">
          ${p.tags.map(t => {
            if (t.startsWith('custom_')) {
              const name = t.replace('custom_', '');
              const ct = getCustomTags().find(c => c.name === name);
              return `<span class="tag">${ct ? (ct.icon || '🏷️') + ct.name : '🏷️' + name}</span>`;
            }
            return `<span class="tag">${TAG_MAP[t] || t}</span>`;
          }).join('')}
        </div>
      </div>
      <button class="player-del" onclick="delPlayer('${p.id}')">×</button>
    </div>
  `).join('');
}

function openAddPlayer() {
  document.getElementById('addPlayerModal').classList.add('active');
  document.getElementById('new-player-name').value = '';
  document.querySelectorAll('.tag-option').forEach(e => e.classList.remove('selected'));
  document.getElementById('custom-tag-input').value = '';
  selectedTagIcon = '🏷️';
  document.querySelectorAll('.tag-icon-btn').forEach(b => b.classList.remove('selected'));
  renderCustomTagsInModal();
}

function renderCustomTagsInModal() {
  const area = document.getElementById('tag-select-area');
  // Remove old custom tags
  area.querySelectorAll('.custom-tag').forEach(e => e.remove());
  // Append custom tags before the input row
  const customTags = getCustomTags();
  customTags.forEach(tag => {
    const el = document.createElement('div');
    el.className = 'tag-option custom-tag';
    el.dataset.tag = 'custom_' + tag.name;
    el.textContent = (tag.icon || '🏷️') + tag.name;
    el.onclick = () => toggleTag(el);
    area.appendChild(el);
  });
}

let selectedTagIcon = '🏷️';

function selectTagIcon(el) {
  document.querySelectorAll('.tag-icon-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedTagIcon = el.textContent;
}

function addCustomTag() {
  const input = document.getElementById('custom-tag-input');
  const val = input.value.trim();
  if (!val) return;
  if (val.length > 8) { alert('标签最多8个字'); return; }
  const tags = getCustomTags();
  const customTags = getCustomTags();
  if (customTags.find(t => t.name === val)) { alert('标签已存在'); return; }
  tags.push({ name: val, icon: selectedTagIcon });
  saveCustomTags(tags);
  input.value = '';
  renderCustomTagsInModal();
}

function closeAddPlayer() {
  document.getElementById('addPlayerModal').classList.remove('active');
}

function toggleTag(el) { el.classList.toggle('selected'); }

function addPlayer() {
  const name = document.getElementById('new-player-name').value.trim();
  if (!name) { alert('请输入姓名'); return; }
  const tags = [...document.querySelectorAll('.tag-option.selected')].map(e => e.dataset.tag);
  const players = getPlayers();
  players.push({ id: uuid(), name, tags });
  savePlayers(players);
  closeAddPlayer();
  renderPlayers();
}

function delPlayer(id) {
  if (!confirm('确认删除该玩家？')) return;
  savePlayers(getPlayers().filter(p => p.id !== id));
  renderPlayers();
}

// ============ Record Tab ============
let selectedPlayerIds = [];

function renderRecordTab() {
  const players = getPlayers();
  const checkList = document.getElementById('player-check-list');
  const scoreArea = document.getElementById('score-input-area');
  const scoreList = document.getElementById('score-input-list');

  if (!players.length) {
    checkList.innerHTML = '<div class="empty">请先添加玩家～</div>';
    scoreArea.style.display = 'none';
    return;
  }

  checkList.innerHTML = players.map(p => `
    <div class="player-check" onclick="togglePlayerCheck('${p.id}', this)">
      <input type="checkbox" id="check-${p.id}">
      <div>
        <div class="pname">${p.name}</div>
        <div class="ptags">${p.tags.map(t => {
          if (t.startsWith('custom_')) {
            const name = t.replace('custom_', '');
            const ct = getCustomTags().find(c => c.name === name);
            return ct ? (ct.icon || '🏷️') + ct.name : '🏷️' + name;
          }
          return TAG_MAP[t] || t;
        }).join(' ')}</div>
      </div>
    </div>
  `).join('');

  // restore selection
  selectedPlayerIds.forEach(id => {
    const cb = document.getElementById('check-' + id);
    if (cb) cb.checked = true;
  });

  renderScoreInputs();
}

function togglePlayerCheck(id, row) {
  const cb = row.querySelector('input[type="checkbox"]');
  cb.checked = !cb.checked;
  if (cb.checked) {
    if (!selectedPlayerIds.includes(id)) selectedPlayerIds.push(id);
  } else {
    selectedPlayerIds = selectedPlayerIds.filter(i => i !== id);
  }
  renderScoreInputs();
}

function renderScoreInputs() {
  const scoreArea = document.getElementById('score-input-area');
  const scoreList = document.getElementById('score-input-list');
  const players = getPlayers();
  const selected = players.filter(p => selectedPlayerIds.includes(p.id));

  if (!selected.length) {
    scoreArea.style.display = 'none';
    return;
  }
  scoreArea.style.display = 'block';
  scoreList.innerHTML = selected.map(p => `
    <div class="score-row">
      <label>${p.name}</label>
      <input type="number" id="score-${p.id}" placeholder="0" min="-9999" max="9999">
    </div>
  `).join('');
}

function saveRecord() {
  if (!selectedPlayerIds.length) { alert('请选择参与玩家'); return; }
  const now = new Date();
  const dateStr = now.toISOString().slice(0, 10);
  const timeStr = now.toTimeString().slice(0, 5);
  const playerScores = selectedPlayerIds.map(id => {
    const inp = document.getElementById('score-' + id);
    const score = parseInt(inp.value) || 0;
    return { playerId: id, score };
  });
  const record = { id: uuid(), date: dateStr, time: timeStr, players: playerScores };
  const records = getRecords();
  records.unshift(record);
  saveRecords(records);

  // reset
  selectedPlayerIds = [];
  document.getElementById('score-input-area').style.display = 'none';
  renderRecordTab();
  alert('战绩已保存！');
}

// ============ History ============
function renderHistory() {
  const list = document.getElementById('history-list');
  const records = getRecords();
  const players = getPlayers();

  if (!records.length) {
    list.innerHTML = '<div class="empty">暂无战绩记录</div>';
    return;
  }

  list.innerHTML = records.map(r => {
    const scoreHtml = r.players.map(ps => {
      const p = players.find(x => x.id === ps.playerId);
      const name = p ? p.name : '未知';
      const cls = ps.score >= 0 ? 'positive' : 'negative';
      const sign = ps.score >= 0 ? '+' : '';
      return `<span class="score-chip ${cls}">${name} ${sign}${ps.score}</span>`;
    }).join('');
    return `
      <div class="record-card">
        <div class="record-header">
          <span class="record-date">📅 ${r.date}</span>
          <span class="record-time">⏰ ${r.time}</span>
        </div>
        <div class="record-players">参与玩家：${r.players.length}人</div>
        <div class="record-scores">${scoreHtml}</div>
        <div style="text-align:right;margin-top:10px;">
          <button class="btn-danger" onclick="delRecord('${r.id}')">删除</button>
        </div>
      </div>
    `;
  }).join('');
}

function delRecord(id) {
  if (!confirm('确认删除该条战绩？')) return;
  saveRecords(getRecords().filter(r => r.id !== id));
  renderHistory();
}

// ============ Init ============
renderRecordTab();
</script>
</body>
</html>
